          cp -r wso2-fsiam-accelerator-4.0.0-M3.zip $HOME/wso2is-7.0.0/
          unzip $HOME/wso2is-7.0.0/wso2-fsiam-accelerator-4.0.0-M3.zip -d $HOME/wso2is-7.0.0/



      - name: Install MySQL 8.0
        run: |
          sudo apt-get update
          sudo apt-get install -y mysql-server
