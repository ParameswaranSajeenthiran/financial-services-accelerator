openapi: 3.0.1
info:
  title: Consent Management API
  description: Consent Management application API
  version: "1.0"
paths:
  /consent/{consentId}/authorizationResource/{authorizationId}:
    get:
      operationId: consentAuthorizationIdGet
      parameters:
        - name: authorizationId
          in: path
          required: true
          schema:
            type: string
        - name: consentId
          in: path
          required: true
          schema:
            type: string
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
      responses:
        default:
          description: default response
          content:
            application/json: {}
  /consent/{consentId}:
    get:
      operationId: consentConsentIdGet
      parameters:
        - name: consentId
          in: path
          required: true
          schema:
            type: string
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
        - name: isDetailedConsentResource
          in: query
          schema:
            type: boolean
        - name: withAttributes
          in: query
          schema:
            type: boolean
            default: true
      responses:
        default:
          description: default response
          content:
            application/json: {}
    put:
      operationId: consentConsentIdPut
      parameters:
        - name: consentId
          in: path
          required: true
          schema:
            type: string
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AmendmentResource'
      responses:
        default:
          description: default response
          content:
            application/json: {}
    delete:
      operationId: consentConsentIdDelete_1
      parameters:
        - name: consentId
          in: path
          required: true
          schema:
            type: string
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
        - name: userId
          in: query
          schema:
            type: string
      responses:
        default:
          description: default response
          content:
            '*/*': {}
  /consent/{consentId}/history:
    get:
      operationId: consentConsentIdHistoryGet
      parameters:
        - name: consentId
          in: path
          required: true
          schema:
            type: string
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
        - name: detailed
          in: query
          schema:
            type: boolean
        - name: status
          in: query
          schema:
            type: string
        - name: actionBy
          in: query
          schema:
            type: string
        - name: fromTime
          in: query
          schema:
            type: integer
            format: int64
        - name: toTime
          in: query
          schema:
            type: integer
            format: int64
        - name: statusAuditId
          in: query
          schema:
            type: string
      responses:
        default:
          description: default response
          content:
            application/json: {}
  /consent/{consentId}/status:
    put:
      operationId: consentConsentIdStatusPut
      parameters:
        - name: consentId
          in: path
          required: true
          schema:
            type: string
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentStatusUpdateResource'
      responses:
        default:
          description: default response
          content:
            application/json: {}
  /consent:
    get:
      operationId: consentGet
      parameters:
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
        - name: consentTypes
          in: query
          schema:
            type: string
        - name: consentStatuses
          in: query
          schema:
            type: string
        - name: clientIds
          in: query
          schema:
            type: string
        - name: userIds
          in: query
          schema:
            type: string
        - name: fromTime
          in: query
          schema:
            type: integer
            format: int32
        - name: toTime
          in: query
          schema:
            type: integer
            format: int32
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
        - name: offset
          in: query
          schema:
            type: integer
            format: int32
      responses:
        default:
          description: default response
          content:
            application/json: {}
    post:
      operationId: consentPost
      parameters:
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
        - name: isImplicitAuth
          in: header
          schema:
            type: boolean
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsentResourceDTO'
      responses:
        default:
          description: default response
          content:
            application/json: {}
  /consent/{consentId}/revoke:
    put:
      operationId: consentRevokeConsentIdPut
      parameters:
        - name: consentId
          in: path
          required: true
          schema:
            type: string
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
      requestBody:
        required: true
        content:
          '*/*':
            schema:
              $ref: '#/components/schemas/ConsentRevokeResource'
      responses:
        default:
          description: default response
          content:
            '*/*': {}
  /consent/status:
    put:
      operationId: consentStatusPut
      parameters:
        - name: OrgInfo
          in: header
          schema:
            type: string
            default: DEFAULT_ORG
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkConsentStatusUpdateResource'
      responses:
        default:
          description: default response
          content:
            application/json: {}
components:
  schemas:
    AmendmentResource:
      type: object
      properties:
        receipt:
          type: string
        validityPeriod:
          type: integer
          format: int32
        consentAttributes:
          type: object
        authorizationResources:
          type: array
          items:
            $ref: '#/components/schemas/ReauthorizeResource'
        currentStatus:
          type: string
    JSONObject:
      type: object
      properties:
        empty:
          type: boolean
      additionalProperties:
        type: object
    ReauthorizeResource:
      type: object
      properties:
        authId:
          type: string
        authorizationStatus:
          type: string
        authorizationType:
          type: string
        resources:
          type: array
          items:
            $ref: '#/components/schemas/Resource'
        userID:
          type: string
    Resource:
      type: object
      properties:
        resource:
          type: object
          properties:
            empty:
              type: boolean
          additionalProperties:
            type: object
        consentMappingStatus:
          type: string
        resourceMappingId:
          type: string
    ConsentStatusUpdateResource:
      type: object
      properties:
        status:
          type: string
        reason:
          type: string
        userID:
          type: string
    AuthorizationResourceDTO:
      required:
        - authorizationStatus
        - authorizationType
        - userID
      type: object
      properties:
        authorizationStatus:
          type: string
        authorizationType:
          type: string
        userID:
          type: string
        resources:
          type: array
          items:
            type: object
    ConsentResourceDTO:
      required:
        - clientID
        - consentType
        - currentStatus
        - receipt
        - recurringIndicator
        - validityPeriod
      type: object
      properties:
        clientID:
          type: string
        consentType:
          type: string
        currentStatus:
          type: string
        receipt:
          type: string
        validityPeriod:
          type: integer
          format: int32
        recurringIndicator:
          type: boolean
        consentAttributes:
          type: object
        authorizationResources:
          type: array
          items:
            $ref: '#/components/schemas/AuthorizationResourceDTO'
    ConsentRevokeResource:
      type: object
      properties:
        reason:
          type: string
        userID:
          type: string
    BulkConsentStatusUpdateResource:
      type: object
      properties:
        clientID:
          type: string
        consentType:
          type: string
        applicableStatusesForStateChange:
          type: array
          items:
            type: string
        status:
          type: string
        reason:
          type: string
        userID:
          type: string
